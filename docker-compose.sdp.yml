  edr-patient:
    platform: linux/amd64
    image: node:18-alpine
    container_name: edr-patient-terminal
    working_dir: /edr
    networks:
      - sdp-net
    volumes:
      - ./agents/real-edr:/edr
    environment:
      - HOST_ID=patient-terminal
      - USER_ROLE=patient
      - USER_EMAIL=patient@hospital.com
      - TARGET=http://monitor:9090/ingest/telemetry
      - INTERVAL_MS=5000
      - WATCH_DIR=/tmp
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=hospital
      - DB_PASSWORD=${POSTGRES_PASSWORD:-F1UFDk8H36Ry2RITAvnErulW}
      - DB_NAME=hospital_db
    command: sh -c "apk add --no-cache procps net-tools && npm install --production 2>/dev/null && node agent.js"
    depends_on:
      - monitor
      - db
    restart: unless-stopped

volumes:
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../docker-volumes/db-data

  encryption-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../docker-volumes/encryption-data

  monitor-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../docker-volumes/monitor-logs

  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../docker-volumes/prometheus-data

  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../docker-volumes/grafana-data
